<section id="start" class="card"><span class="tag">BUBBLING BOILING TEST · 五题版</span><h1>测测你是泡泡岛的哪位嘉宾？</h1><p class="intro">参考泡泡岛的明亮、怪诞、甜酷视觉氛围，做成一个更像官方海报世界观的版本。完成 5 道题，看看你的音乐人格会降落在哪位嘉宾身上。</p><div class="button-row"><button onclick="startTest()">开始测试</button></div><p class="footer-note">本测试为娱乐向音乐人格测试。已适当降低陈绮贞结果的出现概率。</p></section>

const guests={
chenqizhen:{name:"陈绮贞",keywords:["清澈","慢热","文学感","安静坚定"],text:"你像一首被海风吹过的民谣，不急着表达，却总能在安静里击中别人。你会把情绪放进细小的日常里，让一支笔、一盏灯、一段旋律都变得有回声。",spot:"离舞台不远的草地，能听清每一句歌词，也能随时抬头看星星。",comment:"你不是没情绪，你只是比较擅长把崩溃写得很漂亮。",artistUrl:"https://s.weibo.com/weibo?q=%E9%99%88%E7%BB%AE%E8%B4%9E",linkLabel:"去看陈绮贞相关帐号"},
chenli:{name:"陈粒",keywords:["自由","野性","浪漫","不被定义"],text:"你身上有一种不想被解释的气质。你可以温柔，也可以突然转身离开；你喜欢边界模糊的东西，也喜欢那些说不清但很真实的瞬间。",spot:"海边最黑的地方，风最大，但你刚好觉得那里最自由。",comment:"你的灵魂经常不在服务区，但回来的时候会带一首很好听的歌。",artistUrl:"https://s.weibo.com/weibo?q=%E9%99%88%E7%B2%92",linkLabel:"去看陈粒相关帐号"},
fanxiaoxuan:{name:"范晓萱 & 100%",keywords:["怪趣","童心","叛逆","乐队能量"],text:"你不太相信标准答案。你喜欢把可爱和锋利放在一起，把童心和反叛混成一杯很奇怪但很好喝的饮料。别人以为你在玩，其实你比谁都认真。",spot:"后台旁边最热闹的走廊，声音有点乱，但每一秒都可能发生惊喜。",comment:"你的人生原则是：可以很可爱，但不能太正常。",artistUrl:"https://s.weibo.com/weibo?q=%E8%8C%83%E6%99%93%E8%90%B1",linkLabel:"去看范晓萱相关帐号"},
shangwenjie:{name:"尚雯婕",keywords:["先锋","电子","冷感","强烈表达"],text:"你像一束冷色的舞台光，距离感很强，但存在感更强。你追求清晰、锋利、未来感，也不害怕让别人觉得你不好懂。",spot:"主舞台正前方，灯光全部打开的时候，你会比人群更冷静。",comment:"你不是高冷，你只是懒得把自己翻译成大众版本。",artistUrl:"https://s.weibo.com/weibo?q=%E5%B0%9A%E9%9B%AF%E5%A9%95",linkLabel:"去看尚雯婕相关帐号"},
chenshanni:{name:"陈珊妮",keywords:["都市","疏离","冷幽默","高级感"],text:"你像城市凌晨还亮着的一扇窗。你敏锐、克制，有一点冷幽默，也有一点不想被看穿的孤独。你喜欢复杂的人，也喜欢复杂的歌。",spot:"人群边缘的暗处，能观察所有人，但不一定想加入他们。",comment:"你嘴上说随便，审美系统其实已经自动筛掉了百分之八十的人类。",artistUrl:"https://s.weibo.com/weibo?q=%E9%99%88%E7%8F%8A%E5%A6%AE",linkLabel:"去看陈珊妮相关帐号"},
aiyiliang:{name:"艾怡良",keywords:["真实","灵魂感","情绪浓度","爆发力"],text:"你不太擅长假装没事。你的情绪有重量，也有温度，一旦被音乐打开，就会很直接、很深、很难收回。你相信真实比漂亮更重要。",spot:"人群正中间，灯亮起来的时候，你刚好在一首歌里和自己和解。",comment:"你不是太情绪化，你只是比别人更诚实地活着。",artistUrl:"https://www.instagram.com/eve_ai_the_crazy_one/",linkLabel:"去看艾怡良帐号"},
chenjingfei:{name:"陈婧霏",keywords:["复古","梦境","松弛","迷幻"],text:"你像一张泛着蓝绿色光的旧唱片，温柔、松弛、带一点不属于这个年代的浪漫。你不喜欢太直白的表达，更偏爱暧昧的画面和慢慢浮现的情绪。",spot:"海风很轻的角落，灯光像旧电影，你像刚从梦里走出来。",comment:"你的松弛不是摆烂，是一种很有质感的精神出逃。",artistUrl:"https://s.weibo.com/weibo?q=%E9%99%88%E5%A9%A7%E9%9C%8F",linkLabel:"去看陈婧霏相关帐号"},
zhangwanqing:{name:"张婉清",keywords:["清新","细腻","生活感","年轻心事"],text:"你对生活里的小波动很敏感。你可能看起来轻轻的，但心里装着很多没说出口的画面。你的音乐人格像一杯夜晚的汽水，透明，却一直冒泡。",spot:"靠近朋友的位置，笑着听歌，但某一句歌词会突然让你安静下来。",comment:"你看起来很好懂，其实每个小情绪都有自己的隐藏曲目。",artistUrl:"https://s.weibo.com/weibo?q=%E5%BC%A0%E5%A9%89%E6%B8%85",linkLabel:"去看张婉清相关帐号"}};
const questions=[
{q:"1. 如果你的灵魂是一种天气，它更像：",options:[["A. 傍晚的小雨，安静但一直在下","chenqizhen"],["B. 台风来之前的热风，危险又自由","chenli"],["C. 雾里的霓虹灯，看不清但很迷人","chenjingfei"],["D. 晴天突然响起的雷，直接把人震醒","aiyiliang"]]},
{q:"2. 你更容易被哪一种舞台瞬间击中？",options:[["A. 歌手闭着眼唱完最后一句，现场安静到只剩呼吸声","zhangwanqing"],["B. 灯光突然全暗，只剩一个声音悬在空气里","shangwenjie"],["C. 鼓点突然进来，人群像被同一种情绪推着往前走","fanxiaoxuan"],["D. 一段奇怪但很抓人的间奏，让你突然清醒","chenshanni"]]},
{q:"3. 如果你是一首歌里的某个元素，你会是：",options:[["A. 一把很轻的木吉他","zhangwanqing"],["B. 一段反复出现的低音线","fanxiaoxuan"],["C. 一层朦胧、漂浮的合成器 Pad","chenjingfei"],["D. 一句突然出现、让人记很久的歌词","aiyiliang"]]},
{q:"4. 你面对情绪的方式更像：",options:[["A. 把它写进日记，等它慢慢变淡","chenqizhen"],["B. 直接走进去，让它把自己吞没一会儿","chenli"],["C. 把它拆开、重组，变成一个漂亮的结构","chenshanni"],["D. 假装没事，但下一秒它会从歌里冲出来","aiyiliang"]]},
{q:"5. 如果泡泡岛有一个属于你的角落，它会是：",options:[["A. 离舞台不远的草地，能听清歌词，也能安静发呆","chenjingfei"],["B. 海边最黑的地方，可以一个人吹风，不用解释自己","chenli"],["C. 后台旁边的走廊，有点混乱，但每一秒都可能发生惊喜","fanxiaoxuan"],["D. 人群正中间，灯亮起来的时候，刚好被一首歌击中","aiyiliang"]]}];
let current=0,answers=[];
function startTest(){document.getElementById("start").classList.add("hidden");document.getElementById("quiz").classList.remove("hidden");renderQuestion();}
function renderQuestion(){const item=questions[current];document.getElementById("progress").textContent=`第 ${current+1} / ${questions.length} 题`;document.getElementById("question").textContent=item.q;const box=document.getElementById("options");box.innerHTML="";item.options.forEach(option=>{const btn=document.createElement("button");btn.className="option";btn.textContent=option[0];btn.onclick=()=>choose(option[1]);box.appendChild(btn);});}
function choose(guestKey){answers[current]=guestKey;if(current<questions.length-1){current++;renderQuestion();}else{showResult();}}
function goBack(){if(current>0){current--;renderQuestion();}}
function showResult(){const rawScores={};Object.keys(guests).forEach(key=>rawScores[key]=0);answers.forEach(key=>rawScores[key]++);const weightedScores={};Object.keys(rawScores).forEach(key=>{weightedScores[key]=rawScores[key]*(guestWeights[key]||1);});const winner=Object.keys(weightedScores).sort((a,b)=>weightedScores[b]-weightedScores[a])[0];const result=guests[winner];document.getElementById("quiz").classList.add("hidden");document.getElementById("result").classList.remove("hidden");document.getElementById("resultName").textContent=result.name;document.getElementById("resultText").textContent=result.text;document.getElementById("islandSpot").textContent=result.spot;document.getElementById("comment").textContent=result.comment;const keywords=document.getElementById("keywords");keywords.innerHTML="";result.keywords.forEach(word=>{const span=document.createElement("span");span.className="keyword";span.textContent=word;keywords.appendChild(span);});const artistLink=document.getElementById("artistLink");artistLink.href=result.artistUrl;artistLink.textContent=result.linkLabel||"一键转到艺人帐号";}
function restart(){current=0;answers=[];document.getElementById("result").classList.add("hidden");document.getElementById("start").classList.remove("hidden");}
function copyResult(){const name=document.getElementById("resultName").textContent;const text=`我测出来是泡泡岛的 ${name}！`;navigator.clipboard.writeText(text).then(()=>alert("结果已复制")).catch(()=>alert(text));}
