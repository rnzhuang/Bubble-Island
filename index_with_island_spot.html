<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测测你是泡泡岛的哪位嘉宾？（五题版）</title>
  <style>
    :root{
      --bg1:#f6b36b; --bg2:#f3958b; --bg3:#c56b81; --bg4:#7b4e7f;
      --text:#4b3136; --sub:#7a5962;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,238,212,0.6), transparent 22%),
        radial-gradient(circle at 85% 12%, rgba(255,236,216,0.32), transparent 16%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 30%, var(--bg3) 68%, var(--bg4) 100%);
      overflow-x:hidden; position:relative;
    }
    .bg-bubbles{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .bubble{
      position:absolute;border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.45);
      background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.38), rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.02) 70%);
      box-shadow: inset -6px -8px 14px rgba(255,255,255,0.12), 0 0 15px rgba(255,255,255,0.08);
      animation: float 20s linear infinite; opacity:0.8;
    }
    .bubble.small { width:26px; height:26px; }
    .bubble.medium { width:48px; height:48px; }
    .bubble.large { width:74px; height:74px; }
    @keyframes float{ from{transform:translateY(0)} to{transform:translateY(-120vh)} }
    .sea{position:fixed;left:0;right:0;bottom:0;height:230px;overflow:hidden;pointer-events:none;z-index:0}
    .sea::before,.sea::after{
      content:""; position:absolute; left:-10%; width:120%;
      border-radius:45% 55% 0 0 / 28% 28% 0 0; background:rgba(255,244,233,0.12);
      bottom:20px; height:140px;
    }
    .sea::after{bottom:-10px;height:120px;background:rgba(255,255,255,0.12);border-radius:53% 47% 0 0 / 25% 25% 0 0}
    .island{
      position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
      width:132px;height:42px;background:#5c3641;border-radius:60% 40% 52% 48%;
      box-shadow:0 -10px 0 0 rgba(0,0,0,0.06) inset;opacity:0.9;
    }
    .island::before{
      content:"";position:absolute;bottom:22px;left:32px;width:4px;height:42px;background:#624139;border-radius:999px;transform:rotate(-8deg)
    }
    .island::after{
      content:"";position:absolute;bottom:48px;left:26px;width:34px;height:34px;background:#2e825b;border-radius:80% 0 75% 25%;
      transform:rotate(-35deg); box-shadow:18px 6px 0 4px #368d61, 4px -14px 0 1px #31825a;
    }
    .page{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:36px 0}
    .card{
      width:min(920px, 92vw); background:rgba(255,248,242,0.84); border:1px solid rgba(255,255,255,0.4);
      border-radius:30px; backdrop-filter:blur(10px); box-shadow:0 10px 35px rgba(99,40,59,0.18); padding:40px 38px;
    }
    .hidden{display:none}
    .tag{
      display:inline-block;font-size:13px;letter-spacing:.14em;color:#9e5952;border:1px solid rgba(201,116,93,0.38);
      background:rgba(255,255,255,0.48);border-radius:999px;padding:8px 13px;margin-bottom:18px;
    }
    h1{font-size:clamp(34px, 7vw, 64px);line-height:1.08;color:#9c454d;margin-bottom:18px}
    h2{font-size:clamp(28px, 4vw, 42px);margin-bottom:10px;color:#99425b}
    p{font-size:16px;line-height:1.8;color:var(--sub)}
    .intro{max-width:680px;margin-bottom:28px}
    .button-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
    button{
      appearance:none;border:0;cursor:pointer;border-radius:999px;padding:14px 24px;font-size:15px;font-weight:700;color:#fff;
      background:linear-gradient(135deg, #ff865b, #ffb573); box-shadow:0 8px 18px rgba(239,115,87,0.28); transition:transform .18s ease, box-shadow .18s ease;
    }
    button:hover{transform:translateY(-2px);box-shadow:0 12px 20px rgba(239,115,87,0.35)}
    button.secondary{background:rgba(255,255,255,0.7);color:#8e5765;box-shadow:none;border:1px solid rgba(206,132,111,0.35)}
    .progress{margin-bottom:20px;font-size:14px;color:#9e6e76}
    .question{font-size:clamp(24px, 4vw, 34px);font-weight:800;line-height:1.45;margin-bottom:26px;color:#85424d}
    .options{display:grid;gap:14px}
    .option{
      width:100%;text-align:left;color:#573841;background:rgba(255,255,255,0.72);border:1px solid rgba(230,170,144,0.55);
      border-radius:18px;padding:18px 20px;line-height:1.75;box-shadow:none;
    }
    .option:hover{background:rgba(255,243,231,0.95);border-color:#e89568}
    .result-name{font-size:clamp(40px, 8vw, 72px);color:#9b454d;line-height:1.1;margin:8px 0 12px}
    .keywords{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 24px}
    .keyword{padding:7px 12px;border-radius:999px;font-size:14px;color:#8d5463;background:#fff2e6;border:1px solid rgba(234,159,124,0.55)}
    .result-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:24px}
    .mini-card{padding:20px;border-radius:22px;background:rgba(255,255,255,0.62);border:1px solid rgba(235,180,151,0.45)}
    .mini-card h3{color:#b45e56;margin-bottom:8px;font-size:16px}
    .footer-note{margin-top:26px;font-size:13px;color:#8c6770}
    @media (max-width:620px){.card{padding:28px 20px;border-radius:22px}.result-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="bg-bubbles" aria-hidden="true">
    <div class="bubble small" style="left:7%; bottom:-20px; animation-duration:17s; animation-delay:-7s;"></div>
    <div class="bubble medium" style="left:18%; bottom:-80px; animation-duration:19s; animation-delay:-10s;"></div>
    <div class="bubble large" style="left:29%; bottom:-150px; animation-duration:22s; animation-delay:-12s;"></div>
    <div class="bubble small" style="left:43%; bottom:-40px; animation-duration:18s; animation-delay:-3s;"></div>
    <div class="bubble large" style="left:56%; bottom:-140px; animation-duration:24s; animation-delay:-16s;"></div>
    <div class="bubble medium" style="left:69%; bottom:-60px; animation-duration:20s; animation-delay:-9s;"></div>
    <div class="bubble small" style="left:83%; bottom:-30px; animation-duration:16s; animation-delay:-1s;"></div>
    <div class="bubble large" style="left:90%; bottom:-110px; animation-duration:23s; animation-delay:-11s;"></div>
  </div>
  <div class="sea" aria-hidden="true"><div class="island"></div></div>

  <main class="page">
    <section id="start" class="card">
      <span class="tag">BUBBLE ISLAND TEST · 五题版</span>
      <h1>测测你是泡泡岛的哪位嘉宾？</h1>
      <p class="intro">在泡泡、海风、舞台灯和夏夜情绪之间，你更接近哪一种音乐人格？完成下面 5 道抽象问题，看看你会降落在泡泡岛的哪位嘉宾身上。</p>
      <div class="button-row"><button onclick="startTest()">开始测试</button></div>
      <p class="footer-note">本测试为娱乐向音乐人格测试，结果仅供参考。</p>
    </section>

    <section id="quiz" class="card hidden">
      <div class="progress" id="progress"></div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="button-row"><button class="secondary" onclick="goBack()">上一题</button></div>
    </section>

    <section id="result" class="card hidden">
      <span class="tag">YOUR BUBBLE ISLAND GUEST</span>
      <h2>你是</h2>
      <div class="result-name" id="resultName"></div>
      <div class="keywords" id="keywords"></div>
      <p id="resultText"></p>
      <div class="result-grid">
        <div class="mini-card">
          <h3>你的泡泡岛位置</h3>
          <p id="islandSpot"></p>
        </div>
        <div class="mini-card">
          <h3>你的音乐人格锐评</h3>
          <p id="comment"></p>
        </div>
      </div>
      <div class="button-row">
        <button onclick="restart()">重新测试</button>
        <button class="secondary" onclick="copyResult()">复制结果</button>
      </div>
    </section>
  </main>

  <script>
    const guests = {
      chenqizhen: {name:"陈绮贞",keywords:["清澈","慢热","文学感","安静坚定"],text:"你像一首被海风吹过的民谣，不急着表达，却总能在安静里击中别人。你会把情绪放进细小的日常里，让一支笔、一盏灯、一段旋律都变得有回声。",spot:"离舞台不远的草地，能听清每一句歌词，也能随时抬头看星星。",comment:"你不是没情绪，你只是比较擅长把崩溃写得很漂亮。"},
      chenli: {name:"陈粒",keywords:["自由","野性","浪漫","不被定义"],text:"你身上有一种不想被解释的气质。你可以温柔，也可以突然转身离开；你喜欢边界模糊的东西，也喜欢那些说不清但很真实的瞬间。",spot:"海边最黑的地方，风最大，但你刚好觉得那里最自由。",comment:"你的灵魂经常不在服务区，但回来的时候会带一首很好听的歌。"},
      fanxiaoxuan: {name:"范晓萱 & 100%",keywords:["怪趣","童心","叛逆","乐队能量"],text:"你不太相信标准答案。你喜欢把可爱和锋利放在一起，把童心和反叛混成一杯很奇怪但很好喝的饮料。别人以为你在玩，其实你比谁都认真。",spot:"后台旁边最热闹的走廊，声音有点乱，但每一秒都可能发生惊喜。",comment:"你的人生原则是：可以很可爱，但不能太正常。"},
      shangwenjie: {name:"尚雯婕",keywords:["先锋","电子","冷感","强烈表达"],text:"你像一束冷色的舞台光，距离感很强，但存在感更强。你追求清晰、锋利、未来感，也不害怕让别人觉得你不好懂。",spot:"主舞台正前方，灯光全部打开的时候，你会比人群更冷静。",comment:"你不是高冷，你只是懒得把自己翻译成大众版本。"},
      chenshanni: {name:"陈珊妮",keywords:["都市","疏离","冷幽默","高级感"],text:"你像城市凌晨还亮着的一扇窗。你敏锐、克制，有一点冷幽默，也有一点不想被看穿的孤独。你喜欢复杂的人，也喜欢复杂的歌。",spot:"人群边缘的暗处，能观察所有人，但不一定想加入他们。",comment:"你嘴上说随便，审美系统其实已经自动筛掉了百分之八十的人类。"},
      aiyiliang: {name:"艾怡良",keywords:["真实","灵魂感","情绪浓度","爆发力"],text:"你不太擅长假装没事。你的情绪有重量，也有温度，一旦被音乐打开，就会很直接、很深、很难收回。你相信真实比漂亮更重要。",spot:"人群正中间，灯亮起来的时候，你刚好在一首歌里和自己和解。",comment:"你不是太情绪化，你只是比别人更诚实地活着。"},
      chenjingfei: {name:"陈婧霏",keywords:["复古","梦境","松弛","迷幻"],text:"你像一张泛着蓝绿色光的旧唱片，温柔、松弛、带一点不属于这个年代的浪漫。你不喜欢太直白的表达，更偏爱暧昧的画面和慢慢浮现的情绪。",spot:"海风很轻的角落，灯光像旧电影，你像刚从梦里走出来。",comment:"你的松弛不是摆烂，是一种很有质感的精神出逃。"},
      zhangwanqing: {name:"张婉清",keywords:["清新","细腻","生活感","年轻心事"],text:"你对生活里的小波动很敏感。你可能看起来轻轻的，但心里装着很多没说出口的画面。你的音乐人格像一杯夜晚的汽水，透明，却一直冒泡。",spot:"靠近朋友的位置，笑着听歌，但某一句歌词会突然让你安静下来。",comment:"你看起来很好懂，其实每个小情绪都有自己的隐藏曲目。"}
    };

    const questions = [
      {q:"1. 如果你的灵魂是一种天气，它更像：",options:[["A. 傍晚的小雨，安静但一直在下","chenqizhen"],["B. 台风来之前的热风，危险又自由","chenli"],["C. 雾里的霓虹灯，看不清但很迷人","chenjingfei"],["D. 晴天突然响起的雷，直接把人震醒","aiyiliang"]]},
      {q:"2. 你更容易被哪一种舞台瞬间击中？",options:[["A. 歌手闭着眼唱完最后一句，现场安静到只剩呼吸声","chenqizhen"],["B. 灯光突然全暗，只剩一个声音悬在空气里","shangwenjie"],["C. 鼓点突然进来，人群像被同一种情绪推着往前走","fanxiaoxuan"],["D. 一段奇怪但很抓人的间奏，让你突然清醒","chenshanni"]]},
      {q:"3. 如果你是一首歌里的某个元素，你会是：",options:[["A. 一把很轻的木吉他","chenqizhen"],["B. 一段反复出现的低音线","fanxiaoxuan"],["C. 一层朦胧、漂浮的合成器 Pad","chenjingfei"],["D. 一句突然出现、让人记很久的歌词","aiyiliang"]]},
      {q:"4. 你面对情绪的方式更像：",options:[["A. 把它写进日记，等它慢慢变淡","chenqizhen"],["B. 直接走进去，让它把自己吞没一会儿","chenli"],["C. 把它拆开、重组，变成一个漂亮的结构","chenshanni"],["D. 假装没事，但下一秒它会从歌里冲出来","aiyiliang"]]},
      {q:"5. 如果泡泡岛有一个属于你的角落，它会是：",options:[["A. 离舞台不远的草地，能听清歌词，也能安静发呆","chenqizhen"],["B. 海边最黑的地方，可以一个人吹风，不用解释自己","chenli"],["C. 后台旁边的走廊，有点混乱，但每一秒都可能发生惊喜","fanxiaoxuan"],["D. 人群正中间，灯亮起来的时候，刚好被一首歌击中","aiyiliang"]]}
    ];

    let current = 0, answers = [];
    function startTest(){document.getElementById("start").classList.add("hidden");document.getElementById("quiz").classList.remove("hidden");renderQuestion();}
    function renderQuestion(){
      const item = questions[current];
      document.getElementById("progress").textContent = `第 ${current + 1} / ${questions.length} 题`;
      document.getElementById("question").textContent = item.q;
      const options = document.getElementById("options"); options.innerHTML = "";
      item.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option"; btn.textContent = option[0]; btn.onclick = () => choose(option[1]);
        options.appendChild(btn);
      });
    }
    function choose(guestKey){answers[current] = guestKey; if(current < questions.length - 1){current++; renderQuestion();} else {showResult();}}
    function goBack(){if(current > 0){current--; renderQuestion();}}
    function showResult(){
      const scores = {}; Object.keys(guests).forEach(key => scores[key] = 0); answers.forEach(key => scores[key]++);
      const winner = Object.keys(scores).sort((a,b) => scores[b] - scores[a])[0];
      const result = guests[winner];
      document.getElementById("quiz").classList.add("hidden");
      document.getElementById("result").classList.remove("hidden");
      document.getElementById("resultName").textContent = result.name;
      document.getElementById("resultText").textContent = result.text;
      document.getElementById("islandSpot").textContent = result.spot;
      document.getElementById("comment").textContent = result.comment;
      const keywordBox = document.getElementById("keywords"); keywordBox.innerHTML = "";
      result.keywords.forEach(word => { const span = document.createElement("span"); span.className = "keyword"; span.textContent = word; keywordBox.appendChild(span); });
    }
    function restart(){current = 0; answers = []; document.getElementById("result").classList.add("hidden"); document.getElementById("start").classList.remove("hidden");}
    function copyResult(){
      const name = document.getElementById("resultName").textContent;
      const text = `我测出来是泡泡岛的 ${name}！`;
      navigator.clipboard.writeText(text).then(()=>alert("结果已复制")).catch(()=>alert(text));
    }
  </script>
</body>
</html>
